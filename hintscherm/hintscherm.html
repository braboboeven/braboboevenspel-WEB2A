<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Boss hints</title>
  <link rel="stylesheet" href="./css/hint.css">
  <style>
    .slot {
      border: 1px solid red;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: #242429;
    }

    .slot.open {
      border-color: #4a7c59;
      background: #242429;
    }

    .slot h3 {
      margin-bottom: 0.4rem;
      font-size: 1rem;
    }

    .slot .datum {
      font-size: 0.85rem;
      color: #777;
    }

    .slot .inhoud {
      margin-top: 0.8rem;
    }
  </style>
</head>

<body>

  <h1>Big Boss hints</h1>
  <p id="countdown"></p>
  <div id="sloten"></div>

  <script>
    const START_DATUM = '2026-03-17';
    const UNLOCK_UUR = 14;
    const AANTAL_SLOTEN = 8;

    const slotContent = [
      'Hij/zij is heel klein of juist heel groot.',
      'De big boss heeft zwart haar en geen bril.',
      'Leeftijd is tussen 35 en 55 jaar.',
      'De leeftijd is NIET 49.',
      'Verdachte heeft geen groene ogen.',
      'Verdachte blijkt klein te zijn.',
      'Verdachte heeft geen gevangenisrecord.',
      'Verdachte heeft 3 keer de letter e in zijn naam.'
    ];

    function getTodaySlots() {
      const now = new Date();
      const start = new Date(START_DATUM);
      start.setHours(UNLOCK_UUR, 0, 0, 0);
      if (now < start) return [];
      const dagen = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      const first = dagen * 2 + 1;
      const last = first + 1;
      if (first > AANTAL_SLOTEN) return [];
      return [first, Math.min(last, AANTAL_SLOTEN)];
    }

    function getUnlockDate(i) {
      const d = new Date(START_DATUM);
      d.setDate(d.getDate() + Math.floor((i - 1) / 2));
      d.setHours(UNLOCK_UUR, 0, 0, 0);
      return d;
    }

    function formatDate(d) {
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
    }

    function render() {
      const slots = getTodaySlots();
      let html = '';
      if (slots.length === 0) {
        html = '<p>Geen hints beschikbaar.</p>';
      } else {
        for (const i of slots) {
          const datum = getUnlockDate(i);
          html += `<div class="slot open">
            <h3>Hint ${i}</h3>
            <div class="inhoud">${slotContent[i - 1]}</div>
          </div>`;
        }
      }
      document.getElementById('sloten').innerHTML = html;
    }

    function countdown() {
      const now = new Date();
      const next = new Date(now);
      next.setHours(UNLOCK_UUR, 0, 0, 0);
      if (now >= next) next.setDate(next.getDate() + 1);
      const ms = next - now;
      const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
      const m = String(Math.floor((ms % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
      document.getElementById('countdown').textContent = `Volgende hints openen over: ${h}:${m}:${s}`;
    }

    render();
  </script>
</body>

</html>
