<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<link rel="stylesheet" href="./style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <div class="hud">0 0 0 0</div>
    <div class="hud">1</div>
    <div class="hud">00:00</div>
</header>

<main>

<div class="vraag">
-- De verdachte komt een gebouw uit. Het is <br> een vrouw
</div>

<form class="antwoord" action="./leerlingenAntwoord.html">
    <input required type="text" autocomplete="off">
    <button type="submit">Submit</button>
    <button type="button" onclick="confirmHint()">Hint</button>
</form>

</main>

<div id="hintModal" class="hint-modal">
    <div class="hint-modal-content">
        <span class="hint-close" onclick="closeHint()">×</span>
        <h2>HINT</h2>
        <p>FROM ...... WHERE</p>
    </div>
</div>

<form class="controls" action="../startscherm/keuzePagina.html">
    <button>End Game</button>
</form>

<script>

function confirmHint() {
    if (confirm("Weet je zeker dat je een hint wilt gebruiken? Je zult een €500 minder krijgen als je de hint gebruikt.")) {
        showHint();
    }
}

function showHint() {
    document.getElementById('hintModal').style.display = 'flex';
}

function closeHint() {
    document.getElementById('hintModal').style.display = 'none';
}

window.onclick = function(event) {
    const modal = document.getElementById('hintModal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

</script>

</body>
</html>
