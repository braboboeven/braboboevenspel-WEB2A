<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            color: white;
        }

        body {
            margin: 0;
            font-family: 'Cutive Mono', monospace;
            background-color: #1A1A1D;
        }

        /* ====== MAIN LAYOUT ====== */
        .containerDashboard {
            display: grid;
            grid-template-columns: 25% 50% 25%;
            height: 100vh;
        }

        /* ====== LEADERBOARD ====== */
        .leaderboard {
            background-color: #2E2E33;
            padding: 1rem;
            display: grid;
            grid-template-rows: auto repeat(10, 1fr);
            gap: 0.5rem;
        }

        .leaderboard h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .leaderboardpunten {
            background-color: #1A1A1D;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding: 0.75rem 1rem;
            align-items: center;
        }

        /* ====== VRAGEN DISPLAY ====== */
        .vragenDisplay {
            background-color: #2E2E33;
            margin: 2rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .groepDisplayContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .groepDisplayContainer img {
            width: 32px;
            cursor: pointer;
        }

        .groepDisplayContainer h2 {
            font-size: 2.5rem;
        }

        .groepVragenDisplay {
            flex-grow: 1;
            border: 2px solid #BFBFBF;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .goedAntwoordDisplay {
            border: 2px solid #BFBFBF;
            padding: 1rem;
            text-align: center;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ====== TIMER & CONTROLS ====== */
        .timerControl {
            position: relative;
            padding: 2rem;
        }

        .timer {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: #2E2E33;
            padding: 0.75rem 1.5rem;
            font-size: 1.5rem;
            border: 1px solid #BFBFBF;
        }

        .timer2 {
            position: absolute;
            top: 5rem;
            right: 1rem;
            background-color: #2E2E33;
            padding: 0.75rem 1.5rem;
            font-size: 1.5rem;
            border: 1px solid #BFBFBF;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls button {
            background-color: #2E2E33;
            border: 1px solid #BFBFBF;
            padding: 0.75rem 1.5rem;
            font-family: inherit;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .controls button:hover {
            background-color: #3F3F46;
        }
        .groepDisplayContainer {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1rem;
    justify-content: center;
    align-items: center;
    margin-bottom: 2rem;
}

.groepBlock {
    border: 2px solid #BFBFBF;
    height: 60px;
    min-width: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
}
/* test */
.groepBlock img {
    width: 28px;
}

.groepTitel {
    padding: 0 2.5rem;
    font-size: 2.2rem;
}

    </style>
</head>

<body>
<div class="containerDashboard">

    <!-- LEADERBOARD -->
    <div class="leaderboard">
        <h2>LEADERBOARD</h2>

        <div class="leaderboardpunten">
            <div>Naam</div><div>Geld</div><div>Tijd</div>
        </div>
        <div class="leaderboardpunten">
            <div>Naam</div><div>Geld</div><div>Tijd</div>
        </div>
        <div class="leaderboardpunten">
            <div>Naam</div><div>Geld</div><div>Tijd</div>
        </div>
        <div class="leaderboardpunten">
            <div>Naam</div><div>Geld</div><div>Tijd</div>
        </div>
    </div>

    <!-- VRAGEN -->
    <div class="vragenDisplay">
<div class="groepDisplayContainer">
    <div class="groepBlock">
        <img src="../afbeeldingen/PijltjeLinks.png" alt="Vorige">
    </div>

    <div class="groepBlock groepTitel">
        Groep
    </div>

    <div class="groepBlock">
        <img src="../afbeeldingen/PijltjeRechts.png" alt="Volgende">
    </div>
</div>

        <div class="groepVragenDisplay">
            Vragen display
        </div>

        <div class="goedAntwoordDisplay">
            Goed antwoord
        </div>
    </div>

    <!-- TIMER -->
    <div class="timerControl">
        <div class="timer">klassen code : 1234 5678</div>
        <div class="timer2">00:00</div>

        <form class="controls" action="../startscherm/keuzePagina.html">
            <button>Pause / Play</button>
            <button>End Game</button>

        </form>
    </div>

</div>
</body>
</html>
